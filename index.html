<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="icon" href="favicon.png">
	<title>q5play</title>
	<style>
		html,
		body {
			margin: 0;
			padding: 0;
			overflow: hidden;
			height: 100%;
			overscroll-behavior: none;
		}

		/* Page background (sky) — actual grass tiles are drawn inside the canvas now */

		/* Make the canvas scale to fill the screen while preserving a pixelated look */
		main {
			height: 100vh;
			margin: 0;
		}

		canvas {
			display: block;
			width: 100vw;
			height: 100vh;
			image-rendering: pixelated;
			image-rendering: crisp-edges;
			box-shadow: 0 6px 20px rgba(0,0,0,0.25);
		}
	</style>
</head>

<body>
	<main></main>

	<!-- ONLINE LINKS -->
	<script type="module" src="https://q5js.org/q5.js"></script>
	<script type="importmap">
    { "imports": {
      "box2d3-wasm": "https://q5play.org/Box2D.deluxe.mjs"
    } }
  </script>
	<script type="module" src="https://q5play.org/q5play.js"></script>

</html>
